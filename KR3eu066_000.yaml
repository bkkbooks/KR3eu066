body:
  text: 凡例平井氏分量考曰夫物各有極本劑者藥方之極者也其然故東洞氏分割本劑而考其宜定之銖兩而記之以國秤於此乎仲景氏之定方如可行之於今日甚便於醫然韞匱而不沽余患傳寫之久其泯焉故校讎遂上木云一錢盞漢一升也今之一合弱也何以言之行葦詩云洗爵奠斝注云斝爵也夏曰醆殷曰斝周曰爵馬融曰一升曰爵可以知考字書盞琖醆同一方寸匕平井氏分量考曰一方寸匕之散為蜜丸梧桐子之以得十丸為律也一錢匕又曰一錢匕之散以蜜丸之梧桐子大以得五丸為律也後世稱一錢匕者今之一錢一平井氏醫衡曰大烏頭煎烏頭湯烏頭桂枝湯三方如法不可曰再服惟經驗之言宜書諸紳寬政五年癸丑孟春貞庵山人識正文桂枝湯治上衝頭痛發熱汗出惡風者桂枝芍藥大棗生薑各七分半甘草五分上五味以水一盞四分煮取六分桂枝加桂湯治本方證而上衝劇者於本方加桂五分上煮法同前桂枝加芍藥湯治本方證而腹拘攣甚者桂枝大棗各六分芍藥一錢二分甘草四分生薑六分上煮法同前桂枝去芍藥湯治本方證而不拘攣者桂枝大棗各九分甘草六分生薑九分上煮法同前桂枝加葛根湯治本方證而項背強急者桂枝芍藥各六分甘草四分葛根八分大棗生薑各六分上六味以水二盞煮取六分桂枝加黃蓍湯治本方證而黃汗若自汗盜汗者桂枝芍藥生薑大棗各六分甘草黃蓍各四分上六味以水一盞六分煮取六分栝蔞桂枝湯治本方證而渴栝蔞根四分桂枝芍藥大棗生薑各六分甘草四分上六味以水一盞八分煮取六分桂枝加芍藥大黃湯治桂枝加芍藥湯證而有停滯者桂枝生薑各六分大黃二分大棗六分芍藥一錢二分甘草四分上六味以水一盞四分煮取六分桂枝加厚朴杏子湯治本方證而胸滿微喘者桂枝芍藥大棗生薑各六分甘草厚朴杏仁各四分上七味以水一盞四分煮取六分烏頭桂枝湯治腹中絞痛手足逆冷或不仁或身疼痛者烏頭一錢五分上一味以水六勺煮取二勺去滓內蜜四勺煮取二勺作桂枝湯二勺合服之桂枝加附子湯治本方證而惡寒或支節微痛者桂枝芍藥大棗生薑各七分半甘草五分附子三分半上六味以水一盞四分煮取六分桂枝去芍藥加附子湯治桂枝去芍藥湯證而惡寒者桂枝大棗各九分甘草六分生薑九分附子四分半上煮法同前桂枝附子湯治桂枝去芍藥湯證而身體疼煩不能自轉側者桂枝一錢附子一錢一分半大棗生薑各七分半甘草五分上五味以水一盞八分煮取六分桂枝附子去桂加朮湯治本方證而大便硬小便自利不上衝者術八分附子九分甘草四分大棗生薑各六分上煮法同前桂枝去桂加苓朮湯治桂枝湯證而悸小便不利不上衝者芍藥大棗茯苓術生薑各六分甘草四分上六味以水一盞四分煮取六分桂姜草棗黃辛附湯治桂枝去芍藥湯麻黃附子細辛湯二方證相合者桂枝生薑大棗各六分甘草麻黃細辛各四分附子三分上七味以水二盞煮取六分桂枝去芍藥加皂莢湯治桂枝去芍藥湯證而吐濁唾涎沫者桂枝生薑大棗各七分半甘草皂莢各五分上五味以水一盞四分煮取六分桂枝加龍骨牡蠣湯治桂枝湯證而胸腹有動者桂枝芍藥生薑大棗龍骨牡蠣各六分甘草四分上七味以水一盞四分煮取六分桂枝加芍藥生薑人參湯治桂枝湯證而心下痞鞕或拘攣及嘔者桂枝大棗人參各六分生薑芍藥各八分甘草四分上六味以水二盞四分煮取六分桂枝去芍藥加蜀漆龍骨牡蠣湯治桂枝去芍藥湯證而胸腹動劇者桂枝大棗生薑蜀漆各六分牡蠣一錢龍骨八分甘草四分上煮法同前桂枝二麻黃一湯治桂枝湯證多麻黃湯證少者桂枝八分半芍藥大棗生薑各六分半麻黃三分半甘草五分半杏仁三分半上七味以水一盞半煮取六分桂枝二越婢一湯治桂枝湯證多越婢湯證少者桂枝芍藥甘草麻黃各四分半大棗石膏各六分生薑七分上煮法同前桂枝麻黃各半湯治桂枝湯麻黃湯二方證相半者桂枝五分芍藥生薑甘草麻黃大棗各三分杏仁三分上七味以水一盞六分煮取六分小建中湯治裡急腹皮拘急及急痛者芍藥一錢二分桂枝甘草大棗生薑各六分膠飴三錢二分上六味上五味以水一盞四分煮取六分去滓內膠飴更上微火消解黃蓍建中湯治本方證而盜汗或自汗者於本方加黃蓍三分上煮法同前黃蓍桂枝五物湯治桂枝湯證而嘔身體麻痹不急迫者黃蓍芍藥桂枝大棗各七分半生薑一錢半上五味以水一盞八分煮取六分黃蓍桂枝苦酒湯治身體腫發熱汗出汗沾衣色正黃如藥汁者黃蓍一錢二分半芍藥桂枝各七分半上三味以苦酒二分水一盞四分煮取六分桂枝甘草湯治上衝急迫者桂枝二錢甘草一錢上二味以水一盞八分煮取六分半夏散及湯治咽喉痛上衝急迫者半夏桂枝甘草各一錢上三味搗篩以水一盞煎七沸內散更煮三沸少少飲之桂枝甘草附子湯治桂枝甘草湯證而骨節煩疼小便不利者甘草術各六分附子九分桂枝一錢二分上四味以水一盞二分煮取六分桂枝甘草龍骨牡蠣湯治胸腹有動急迫者桂枝四分甘草龍骨牡蠣各八分上四味以水一盞二分煮取六分桂枝人參湯治人參湯證而上衝急迫劇者桂枝甘草七分半人參術乾薑各六分上四味以水一盞八分煮取一盞內桂枝煮取六分人參湯治心下痞鞕小便不利或急痛或胸中痹者人參術甘草乾薑各七分半上四味以水一盞六分煮取六分茯苓甘草湯治心下悸上衝而嘔者茯苓桂枝各一錢生薑一錢半甘草五分上四味以水一盞二分煮取六分茯苓杏仁甘草湯治悸而胸中痹者茯苓一錢半杏仁一錢甘草五分上三味以水一盞二分煮取六分茯苓戎鹽湯治心下悸小便不利者茯苓二錢四分術六分鹽一分半上三味以水一盞二分煮取六分去滓內鹽令消私曰平井氏分量考曰戎鹽一名青鹽漢渡只一種今不易得無已則可以食鹽代用又曰食鹽可用出於播州赤穗者葵子茯苓散治小便不利心下悸腫滿者葵子一斤私曰今之四十八錢弱茯苓三兩私曰今之九錢弱上二味為散飲服方寸匕日三服苓薑朮甘湯治心下悸小便自利腰中冷如坐水中若痛重形如水狀者術甘草各四分乾薑茯苓各八分上四味以水一盞煮取六分苓桂朮甘湯治心下悸上衝起則頭眩小水不利者茯苓一錢桂枝七分半術甘草各五分上四味以水一盞二分煮取六分苓桂甘棗湯治臍下悸而攣急上衝者茯苓一錢二分甘草四分半大棗五分半桂枝六分上四味以水二盞煮取六分苓桂五味甘草湯治心下悸上衝咳而急迫者桂枝茯苓各八分甘草六分五味子一錢二分上四味以水一盞六分煮取六分苓甘五味姜辛湯治前方證而不上衝痰飲滿者茯苓六分甘草乾薑細辛各四分半五味子九分上五味以水一盞六分煮取六分苓甘姜味辛夏湯治前方證而嘔者茯苓六分甘草細辛乾薑各三分五味子半夏各九分上六味以水一盞六分煮取六分苓甘姜味辛夏仁湯治前方證而微浮腫者甘草乾薑細辛各三分杏仁半夏五味子各六分茯苓四分上七味以水二盞煮取六分苓甘姜味辛夏仁黃湯治前方證而腹中微結者於前方加大黃三分上煮法同前茯苓澤瀉湯治心下悸小便不利上衝及嘔吐渴欲飲水者茯苓一錢二分澤瀉六分甘草桂枝各三分術四分半生薑六分上六味以水二盞四分煮五味取六分內澤瀉更煮取六分澤瀉湯治苦冒眩小便不利者澤瀉二錢半術一錢上二味以水一盞二分煮取六分五苓散治消渴小便不利若渴欲飲水水入則吐者澤瀉一錢茯苓豬苓術各六分桂枝四分上五味為散白飲服方寸匕茵陳五苓散治發黃兼前方證者茵陳蒿十分私曰今之七錢五分弱五苓散五分私曰今之三錢七分五釐弱上二物和服方寸匕日三服豬苓湯治小便不利若淋瀝若渴欲飲水者豬苓澤瀉茯苓滑石阿膠各六分上五味上四味以水一盞二分煮取六分內膠令消豬苓散治渴而心下悸小便不利者豬苓茯苓術各等分上三味為散飲服方寸匕日三牡蠣澤瀉散治身體水腫腹中有動渴而小便不利者牡蠣澤瀉栝蔞根蜀漆葶藶海藻商六各等分上七味為末白飲和服方寸匕日三服八味丸治臍下不仁小便不利者乾地黃八兩私曰今之二十四錢弱山茱萸薯蕷各四兩私曰今之十二錢弱茯苓牡丹皮各三兩私曰今之九錢弱桂枝附子各一兩私曰今之三錢弱類聚方曰外臺秘要作桂枝二兩附子二兩今從之澤瀉三兩私曰今之九錢弱上八味末之煉蜜和丸梧子大酒下十五丸日再服栝蔞瞿麥丸治心下悸小便不利惡寒而渴者栝蔞根二兩私曰今之六錢弱茯苓薯蕷各三兩私曰今之九錢弱附子一枚私曰今之四錢五分弱瞿麥一兩私曰今之三錢弱上五味末之煉蜜丸梧子大飲服三丸日三服麻黃湯治喘而無汗頭痛發熱惡寒身體疼者麻黃一錢二分桂枝八分杏仁一錢二分甘草四分上四味以水二盞四分煮取六分麻黃加朮湯治本方證而小便不利者麻黃七分半桂枝五分杏仁七分半術一錢甘草二分半上五味以水二盞二分煮取六分麻黃甘草湯治喘急息迫或自汗或不汗者甘草一錢麻黃二錢上二味以水二盞煮取六分麻黃附子甘草湯治前方證而惡寒或身微痛者甘草麻黃各一錢附子七分半上三味以水一盞四分煮取六分麻黃杏仁甘草石膏湯治麻黃甘草湯證而咳煩渴者麻黃一錢二分杏仁六分甘草六分石膏二錢四分上四味以水二盞煮取六分麻黃附子細辛湯治麻黃附子甘草湯證而不急迫有痰飲之變者麻黃細辛各一錢附子七分半上三味以水二盞煮取六分麻黃杏仁薏苡甘草湯治麻黃杏仁甘草石膏湯證而不煩渴有水氣者薏苡仁二錢甘草五分麻黃一錢杏仁五分上四味以水一盞半煮取六分牡蠣湯治麻黃甘草湯證而胸中有動者牡蠣一錢甘草五分麻黃一錢蜀漆七分半上四味以水二盞四分煮蜀漆麻黃得一盞八分內二味煮取六分麻黃醇酒湯治喘而發黃或身疼者麻黃三錢上一味以清酒一盞二分煮取六分頓服半夏麻黃丸治喘而嘔者半夏麻黃各等分上二味末之蜜丸小豆大飲服三丸日三大青龍湯治喘及咳嗽渴欲飲水上衝或身疼惡風寒者麻黃一錢二分桂枝甘草各四分杏仁四分石膏一錢六分生薑大棗各六分上七味以水一盞八分煮取六分小青龍湯治咳喘上衝頭痛發熱惡風或乾嘔者麻黃芍藥甘草乾薑桂枝細辛各三分半夏五味子各六分上八味以水二盞煮取六分文蛤湯治煩渴而喘咳急者文蛤一錢麻黃甘草生薑各六分石膏一錢杏仁四分大棗六分上七味以水一盞八分煮取六分越婢湯治大青龍湯證而不咳嗽上衝者麻黃一錢二分石膏一錢六分甘草四分生薑六分大棗七分半上五味以水一盞二分煮取六分越婢加朮湯治本方證而小便不利者麻黃九分石膏一錢二分大棗術各六分甘草二分生薑四分半上六味以水一盞二分煮取六分越婢加半夏湯治本方證而嘔逆者麻黃九分石膏一錢二分甘草三分生薑四分半大棗六分半夏七分半上煮法同前葛根湯治項背強急發熱惡風或喘或身疼者葛根八分麻黃六分桂枝芍藥甘草各四分大棗生薑各六分上七味以水二盞煮取六分葛根加半夏湯治本方證而嘔者葛根六分麻黃四分半桂枝甘草芍藥各三分半夏九分大棗生薑各四分半上八味以水二盞煮取六分葛根黃連黃芩湯治項背強急心悸而下利者葛根一錢六分甘草黃芩各四分黃連六分上四味以水二盞煮取六分小