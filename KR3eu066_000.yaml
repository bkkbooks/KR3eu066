四分煮取六分甘草乾薑湯治厥而煩躁多涎唾者甘草二錢乾薑一錢上二味以水一盞二分煮取六分四逆湯治四肢逆厥身體疼痛下利清穀或小便清利者甘草一錢二分乾薑附子各九分上三味以水一盞半煮取六分通脈四逆湯治前方證而劇者甘草一錢附子七分半乾薑一錢半上煮法同前四逆加人參湯治四逆湯證而心下痞者甘草一錢乾薑七分半附子七分半人參五分上煮法同前茯苓四逆湯治前方證而悸者乾薑附子各三分甘草四分茯苓一錢二分人參三分上五味以水一盞煮取六分通脈四逆加豬膽汁湯治通脈四逆湯證而急結者於本方加膽汁一大蜆殼余依本方附子粳米湯治腹中雷鳴切痛或嘔吐者附子三分半夏一錢二分甘草二分大棗五分粳米二錢上五味以水一盞六分煮取六分薏苡附子散治胸中痹惡寒者薏苡仁附子各等分上二味為散服方寸匕日三薏苡附子敗漿散治身甲錯腹皮急按之濡如腫狀腹無積聚者薏苡仁十分私曰今之七錢五分弱附子二分私曰今之一錢五分弱敗漿五分私曰今之三錢七分五釐弱上三味為散取方寸匕以水一盞二分煮減半頓服大烏頭煎治毒繞臍絞痛或自汗出手足厥冷者烏頭四錢上一味以水九分煮取三分去滓內蜜六分再煎取六分烏頭湯治骨節疼痛不可屈伸若自汗或盜汗若腹中絞痛者麻黃芍藥黃蓍甘草各六分烏頭一錢五分如大烏頭煎法上以水九分煮四味取三分去滓內蜜煎中更煎和服赤丸治心下悸有痰飲惡寒或微厥者茯苓半夏各四兩私曰今之十二錢弱烏頭二兩私曰今之六錢弱細辛一兩私曰今之三錢弱上四味末之內真朱為煉蜜丸如麻子大先食酒飲下三丸日三私曰平井氏分量考曰內真朱為色以淡紅色為度加一兩半可也貞庵曰今之四錢五分弱也真武湯治心中燥身身閏動振振欲擲地小便不利或嘔若下利若拘痛者茯苓芍藥生薑各九分附子四分半術六分上五味以水一盞六分煮取六分附子湯治身體攣痛小便不利心下痞鞕若腹痛者茯苓芍藥附子各六分術八分人參四分上煮法同前天雄散治小便不利上逆臍下有動惡寒者天雄四兩半私曰三枚也今之十三錢五分弱也龍骨三兩私曰今之九錢弱也術八兩私曰今之二十四錢弱也桂枝六兩私曰今之十八錢弱也上四味為散酒服三錢七日三梔子豉湯治心中懊憹者梔子一錢四分豉二錢上二味以水一盞六分先煮梔子取一盞去滓內豉煮取六分梔子甘草豉湯治本方證而急迫者於本方加甘草一錢上煮法同前梔子生薑豉湯治本方證而嘔者於本方加生薑二錢半上煮法同前枳實梔子豉湯治本方證而胸滿者枳實六分梔子七分豉二錢四分上三味以水一盞六分先煮二味取八分下豉煮取六分梔子大黃湯治前方證而閉者梔子六分枳實一錢半大黃三分豉四分上四味以水一盞八分煮三味取一盞下豉取六分茵陳蒿湯治一身發黃大便難者茵陳蒿一錢八分梔子七分大黃六分上三味以水二盞煮茵陳蒿取一盞二分內二味煮取六分梔子蘗皮湯治身黃髮熱心煩者梔子一錢二分甘草六分黃蘗一錢二分上三味以水一盞六分煮取六分梔子厚朴湯治胸腹煩滿者厚朴枳實各一錢二分梔子七分上三味以水一盞四分煮取六分梔子乾薑湯治心中微煩者梔子一錢四分乾薑一錢二分上二味以水一盞四分煮取六分大陷胸湯治結胸或從心下至少腹鞕滿者大黃九分芒硝二錢甘遂七釐半末之上以水一盞八分煮大黃取六分內芒硝令沸內甘遂末服大陷胸丸治結胸或項背強者大黃半斤私曰今之二十四錢弱芒硝半斤私曰今之二十錢弱杏仁半斤私曰今之十八錢弱葶藶半斤私曰今之十五錢甘遂一錢七上五味上四味搗和取如彈丸一枚以白蜜一分強水一盞二分煮取六分內甘遂末服小陷胸湯治小結胸者黃連四分半夏二錢四分栝蔞實八分上三味以水一盞八分煮栝蔞實取九分內二味煮取六分栝蔞薤白白酒湯治胸背痛喘息咳唾者栝蔞實六分薤白二錢四分白酒二盞上三味同煮取六分私曰平井氏分量考曰白酒千金方作酨漿即酢也今試用之氣味猛烈而難下於咽嗌也故不採用按白酒之來尚矣靈樞經曰足陽明之筋病以白酒和桂以塗其緩者小半夏湯治吐而不渴者半夏二錢四分生薑一錢六分上二味以水二盞八分煮取六分生薑半夏湯治似喘不喘似嘔不嘔似噦不噦心中憒憒然無奈何者半夏三錢生薑汁上以水一盞二分煮半夏取八分內生薑汁四分煮取六分小半夏加茯苓湯治本方證而眩悸者半夏二錢四分生薑一錢六分茯苓六分上三味以水二盞八分煮取六分半夏苦酒湯治咽中生瘡音啞者半夏五分雞子一枚去黃在白內苦酒於其上上內半夏於雞子殼中安火上令三沸去滓少少含咽之私曰今以此造法不成宜從原法誠以半夏著苦酒一夜為佳難子乃可從東洞氏之說唯不內苦酒已半夏厚朴湯治咽中如有灸臠或嘔或心下悸者厚朴三分半夏一錢二分茯苓四分干蘇葉二分生薑五分上五味以水一盞煮取六分半夏乾薑散治乾嘔吐逆涎沫者半夏乾薑各等分上二味為散取方寸匕以水一盞三分煮取六分乾薑人參半夏丸治嘔吐不止心下痞鞕者乾薑人參各一兩私曰今之三錢弱半夏二兩私曰今之六錢弱上三味末之以生薑汁糊為丸如梧子大服十丸日三半夏瀉心湯治心下痞鞕腹中雷鳴者半夏九分黃連一分半黃芩人參大棗乾薑甘草各四分半上七味以水二盞煮取一盞二分去滓再煎取六分甘草瀉心湯治前方證而心煩不得安者甘草六分半夏九分黃連一分半黃芩人參大棗乾薑各四分半上煮法同前生薑瀉心湯治半夏瀉心湯證而嘔者生薑六分半夏九分黃連一分半黃芩四分半乾薑一分半人參甘草大棗各四分半上煮法同前吳茱萸湯治胸滿心下痞鞕嘔者吳茱萸一錢五釐人參大棗各四分半生薑九分上四味以水二盞一分煮取六分厚朴生薑半夏甘草人參湯治胸腹滿而嘔者厚朴生薑各一錢二分半夏九分甘草三分人參一分半上五味以水二盞煮取六分黃連湯治心煩心下痞欲嘔吐上衝者黃連甘草乾薑桂枝各四分半人參三分半夏九分大棗四分半上七味以水二盞煮取一盞二分乾薑黃連黃芩人參湯治心煩心下痞鞕吐下者乾薑黃連黃芩人參各七分半上四味以水一盞八分煮取六分大建中湯治腹大痛嘔不能食腹皮起如有頭足者蜀椒六分乾薑一錢六分人參八錢膠飴五勺即十六錢上四味上三味以水一盞六分煮取八分去滓內飴煎取六分黃連阿膠湯治心中悸而煩不得眠者黃連一錢二分黃芩三分芍藥六分雞子黃一枚今之三分阿膠九分上五味以水一盞半先煮三物取六分去滓內膠烊盡小冷內雞子黃攪令相得溫服黃芩湯治下利腹拘急者黃芩大棗各九分甘草芍藥各六分上四味以水二盞煮取六分黃芩加半夏生薑湯治前方證而嘔逆者黃芩大棗各六分甘草四分芍藥四分半夏一錢二分生薑六分上煮法同前六物黃芩湯治心下痞鞕乾嘔下利上衝者黃芩大棗人參乾薑各四分半桂枝一分半半夏九分上六味以水一盞四分煮取六分三物黃芩湯治心胸苦煩者黃芩四分苦參八分乾地黃一錢六分上三味以水一盞八分煮取六分白頭翁湯治熱利下重而心悸者白頭翁五分黃柏黃連秦皮各七分半上四味以水二盞煮取六分白頭翁加甘草阿膠湯治前方證而有血證急迫者白頭翁四分黃連黃柏秦皮各六分甘草阿膠各四分上六味上五味以水一盞七分煮取六分內膠令消木防己湯治心下痞鞕煩渴者防己七分半石膏一錢六分桂枝五分人參一錢上四味以水一盞八分煮取六分木防己去石膏加茯苓芒硝湯治心下痞堅而悸者防己六分桂枝四分人參八分茯苓八分芒硝一錢二分上五味上四味以水一盞八分煮取六分內芒硝今消防己茯苓湯治四膚聶聶動水氣在皮膚而上衝者防己黃蓍桂枝各四分半茯苓九分甘草三分上五味以水一盞八分煮取六分防己黃蓍湯治水病身重汗出惡風小便不利者防己六分甘草三分黃蓍七分半術大棗生薑各四分半上六味以水一盞八分煮取六分枳實芍藥散治腹滿拘攣或痛者枳實芍藥各等分上二味為末服方寸匕日三枳朮湯治心下堅滿小便不利者枳實二錢二分術六分上二味以水一盞煮取六分排膿散治瘡家胸腹拘滿若吐黏痰或便膿血者枳實一錢六分芍藥六分桔梗二分上三味為末取雞子黃三分以藥末與雞子黃相等揉和令相得飲和之日一服桂枝枳實生薑湯治胸滿上逆或嘔者桂枝九分枳實一錢五分生薑九分上三味以水一盞二分煮取六分枳實薤白桂枝湯治胸中痹滿痛者枳實八分薤白一錢六分桂枝二分栝蔞實四分厚朴八分上五味以水一盞八分先煮枳實厚朴取八分去滓內諸藥煮取六分橘皮枳實生薑湯治胸中痹滿而嘔者橘皮二錢四分枳實四分半生薑一錢二分上三味以水一盞半煮取六分茯苓飲治心下痞鞕而悸小便不利胸滿而自吐宿水者茯苓人參術各六分枳實四分橘皮五分生薑八分上六味以水二盞煮取六分橘皮竹茹湯治胸中痹吃逆者橘皮三錢二分竹茹八分大棗七分半生薑八分甘草五分人參一分上煮法同前橘皮湯治胸中痹嘔噦者橘皮二錢生薑四錢上二味以水一盞四分煮取六分桂枝茯苓丸治拘攣上衝心下悸經水有變或胎動者桂枝茯苓芍藥桃仁牡丹皮各等分上五味末之蜜丸兔屎大芎歸膠艾湯治漏下腹中痛者芎藭阿膠甘草各三分艾葉當歸各四分半芍藥六分乾地黃九分上七味以水一盞清酒一盞合煮取六分內膠令消旋覆花代赭石湯治心下痞鞕噯氣不除者旋覆花甘草各六分人參四分半夏一錢二分生薑一錢代赭石二分大棗五分上七味以水二盞煮取一盞二分去滓再煎取六分赤石脂禹餘糧湯治毒在臍下而利者赤石脂一錢六分禹餘糧一錢六分上二味以水一盞八分煮取六分桃花湯治便膿血者赤石脂一錢六分乾薑七分粳米二錢上三味以水二盞煮取六分更內赤石脂末方寸匕酸棗仁湯治煩躁不得眠者酸棗仁二錢四分甘草三分知母芎藭茯苓各二分上五味以水一盞六分先煮酸棗仁取一盞二分內諸藥煮取六分葶藶大棗瀉肺湯治浮腫咳逆喘鳴迫塞胸滿強急者葶藶一錢大棗十錢八分上二味先以水一盞八分煮取一盞二分去滓內葶藶煮取六分蜜煎導治肛中乾燥大便澀者蜜七合私曰今之七勺弱也上一味內銅器中微火煎之稍凝似飴狀擾之勿令焦著欲可丸並手捻作挺令頭銳大如指長二寸許當熱時急作冷則硬以內穀道中以手急抱欲大便時乃去之私曰二寸今之一寸四分強麻仁丸治平日大便秘者麻子仁二升私曰今之四十八錢芍藥半斤私曰今之二十四錢弱大黃一斤私曰今之四十八錢弱厚朴一尺私曰今之四十八錢弱枳實半斤私曰今之二十四錢弱杏仁一升私曰今之二十七錢上六味為末煉蜜為丸梧子大飲服十丸日三己椒藶黃丸治腹滿口舌乾燥二便澀滯者防己椒目葶藶大黃各一兩私曰今之三錢弱上四味末之蜜和丸梧子大服一丸日三蜀漆散治寒熱發作有時臍下有動者蜀漆雲母龍骨各等分上三味為末發前以漿水服半錢匕平井氏分量考曰地漿水一名土漿造法詳於本章云云一方盛赤土於器內入水造之亦可備急也經稱漿水者即地漿水也十棗湯治病在胸腹掣痛者芫花甘遂大戟各等分為末大棗十枚上以水一盞煮大棗取六分去滓內散一錢匕羸人半錢匕桔梗白散治毒在胸咽或吐下如膿汁者桔梗三分私曰今之二錢二分五釐弱也貝母同巴豆一分私日今之七分五釐弱也上三味為末以白飲服半錢匕羸者減之走馬湯治胸腹有毒若心痛若腹痛者杏仁二枚巴豆二枚上二味以綿纏捶令碎熱湯六分捻取白汁飲之備急丸治心腹急痛者大黃巴豆乾薑各一兩私曰今之三錢弱上為末蜜丸礬石湯治腳氣痿弱不仁及上入搶心者礬石二兩私曰今之六錢弱上一味以漿水一斗五升煎三五沸浸腳良私曰漿水說見蜀漆散方後一斗五升乃今之一升五合弱也消礬散治一身悉黃腹脹如水狀大便黑時溏者礬石硝石各等分上二味為散以大麥粥汁和服方寸匕日三礬石丸治經水不利下白物者礬石三分私曰今之二錢二分五釐弱杏仁一分私曰今之七分五釐上二味末之煉蜜和丸棗核大以內藏中蛇床子散治下白物陰中癢或有小瘡者蛇床子上一味末之以白粉多許和令相得如棗大綿裹內之自然溫溫陰中坐藥平井氏分量考曰白粉即白堊
